name: Codex from issue comments

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  codex_actor:
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: voarsh2/codex-actions-workflows/.github/workflows/codex_actor.yml@main
    with:
      event_name: issue_comment
      repository_owner: ${{ github.repository_owner }}
      repository_name: ${{ github.event.repository.name }}
      repository_full_name: ${{ github.repository }}
      default_branch: ${{ github.event.repository.default_branch }}
      actor: ${{ github.actor }}
      sender_type: ${{ github.event.sender.type }}
      author_association: ${{ github.event.comment.author_association }}
      comment_body: ${{ github.event.comment.body }}
      issue_number: ${{ github.event.issue.number }}
      is_pull_request: ${{ github.event.issue.pull_request != null }}
      pull_request_number: ${{ github.event.issue.number }}
      model_provider: theclawbay
      model: gpt-5.5
      effort: medium
    secrets:
      codex_api_key: ${{ secrets.CODEX_API_KEY }}
      codex_base_url: ${{ secrets.CODEX_BASE_URL }}
